<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Newsreader:ital,wght@1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background: #FFD23F;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      color: #141210;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }
    /* halftone corner */
    .halftone {
      position: absolute; top: 0; right: 0; width: 420px; height: 420px;
      background: radial-gradient(#141210 1.6px, transparent 2px) 0 0 / 20px 20px;
      opacity: 0.16; pointer-events: none;
    }
    .wrap {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 72px;
    }
    .left { max-width: 660px; }
    .stickers { display: flex; gap: 14px; margin-bottom: 26px; }
    .sticker {
      display: inline-block; border: 3px solid #141210; border-radius: 10px;
      padding: 9px 16px; font-weight: 800; font-size: 16px;
      font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px;
      box-shadow: 4px 4px 0 #141210; line-height: 1;
    }
    .wordmark {
      font-weight: 800; font-size: 168px; line-height: 0.82;
      letter-spacing: -6px; transform: rotate(-1deg); transform-origin: left;
    }
    .tagline {
      font-family: 'Newsreader', serif; font-style: italic; font-weight: 500;
      font-size: 38px; line-height: 1.1; margin-top: 26px;
    }
    .url {
      font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600;
      letter-spacing: 2px; text-transform: uppercase; margin-top: 34px; opacity: 0.85;
    }
    .right { flex-shrink: 0; margin-right: 8px; }
  </style>
</head>
<body>
  <div class="halftone"></div>
  <div class="wrap">
    <div class="left">
      <div class="stickers">
        <span class="sticker" style="background:#141210;color:#FFD23F;transform:rotate(-4deg)">MODERNIST CATALAN</span>
        <span class="sticker" style="background:#E83A2F;color:#FFF6E0;transform:rotate(3deg)">PER A EXPATS</span>
      </div>
      <div class="wordmark">Cassola<span style="color:#E83A2F">!</span></div>
      <div class="tagline">Català que cou a foc lent.</div>
      <div class="url">cassola.xyz · català de restaurant</div>
    </div>
    <div class="right">
      <!-- en Caçó -->
      <svg viewBox="0 0 140 130" width="360" height="334">
        <g transform="translate(4,4)">
          <path d="M20 38 L 120 38 L 110 110 Q 70 122 30 110 Z" fill="#141210"/>
          <ellipse cx="70" cy="38" rx="50" ry="10" fill="#141210"/>
        </g>
        <path d="M20 38 L 120 38 L 110 110 Q 70 122 30 110 Z" fill="#E83A2F" stroke="#141210" stroke-width="4" stroke-linejoin="round"/>
        <ellipse cx="70" cy="38" rx="50" ry="10" fill="#E83A2F" stroke="#141210" stroke-width="4"/>
        <ellipse cx="70" cy="35" rx="46" ry="6" fill="#141210" opacity="0.25"/>
        <ellipse cx="14" cy="60" rx="6" ry="14" fill="#E83A2F" stroke="#141210" stroke-width="4"/>
        <ellipse cx="126" cy="60" rx="6" ry="14" fill="#E83A2F" stroke="#141210" stroke-width="4"/>
        <circle cx="55" cy="68" r="9" fill="#FFF6E0" stroke="#141210" stroke-width="3"/>
        <circle cx="85" cy="68" r="9" fill="#FFF6E0" stroke="#141210" stroke-width="3"/>
        <circle cx="56" cy="70" r="4" fill="#141210"/>
        <circle cx="86" cy="70" r="4" fill="#141210"/>
        <circle cx="57" cy="68" r="1.5" fill="#FFF6E0"/>
        <circle cx="87" cy="68" r="1.5" fill="#FFF6E0"/>
        <path d="M52 88 Q 70 102 88 88" stroke="#141210" stroke-width="4" fill="none" stroke-linecap="round"/>
        <circle cx="40" cy="88" r="4" fill="#FFD23F" opacity="0.9"/>
        <circle cx="100" cy="88" r="4" fill="#FFD23F" opacity="0.9"/>
        <path d="M55 22 Q 50 14 58 8" stroke="#141210" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M70 18 Q 65 10 73 4" stroke="#141210" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M85 22 Q 80 14 88 8" stroke="#141210" stroke-width="3" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
  </div>
</body>
</html>
