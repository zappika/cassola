<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Cassola — Català que cou a foc lent.</title>
  <meta name="description" content="Català de restaurant per a expats de Barcelona. Què dir exactament quan entres, demanes i pagues — tot en català." />

  <!-- Open Graph (WhatsApp, iMessage, Facebook, LinkedIn) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Cassola" />
  <meta property="og:locale" content="ca_ES" />
  <meta property="og:url" content="https://cassola.xyz/" />
  <meta property="og:title" content="Cassola — Català que cou a foc lent." />
  <meta property="og:description" content="Català de restaurant per a expats de Barcelona. Què dir exactament quan entres, demanes i pagues — tot en català." />
  <meta property="og:image" content="https://cassola.xyz/og.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Cassola — en Caçó, una cassola de fang somrient, amb el lema 'Català que cou a foc lent.'" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Cassola — Català que cou a foc lent." />
  <meta name="twitter:description" content="Català de restaurant per a expats de Barcelona. Què dir exactament quan entres, demanes i pagues — tot en català." />
  <meta name="twitter:image" content="https://cassola.xyz/og.png" />

  <!-- Favicons / app icons (en Caçó) -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;800&family=Newsreader:ital,wght@1,400;1,500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: #FFD23F;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const C = {
      yellow:    '#FFD23F',
      yellowDeep:'#E9B91A',
      red:       '#E83A2F',
      ink:       '#141210',
      cream:     '#FFF6E0',
      green:     '#1F8A52',
      blue:      '#2840B5',
      muted:     '#6E6557',
    };

    function CassolaMascot({ size = 130, expression = 'happy' }) {
      return (
        <svg viewBox="0 0 140 130" width={size} height={size * (130/140)}>
          <g transform="translate(4,4)">
            <path d="M20 38 L 120 38 L 110 110 Q 70 122 30 110 Z" fill={C.ink}/>
            <ellipse cx="70" cy="38" rx="50" ry="10" fill={C.ink}/>
          </g>
          <path d="M20 38 L 120 38 L 110 110 Q 70 122 30 110 Z" fill={C.red} stroke={C.ink} strokeWidth="4" strokeLinejoin="round"/>
          <ellipse cx="70" cy="38" rx="50" ry="10" fill={C.red} stroke={C.ink} strokeWidth="4"/>
          <ellipse cx="70" cy="35" rx="46" ry="6" fill={C.ink} opacity="0.25"/>
          <ellipse cx="14" cy="60" rx="6" ry="14" fill={C.red} stroke={C.ink} strokeWidth="4"/>
          <ellipse cx="126" cy="60" rx="6" ry="14" fill={C.red} stroke={C.ink} strokeWidth="4"/>
          <circle cx="55" cy="68" r="9" fill={C.cream} stroke={C.ink} strokeWidth="3"/>
          <circle cx="85" cy="68" r="9" fill={C.cream} stroke={C.ink} strokeWidth="3"/>
          <circle cx="56" cy="70" r="4" fill={C.ink}/>
          <circle cx="86" cy="70" r="4" fill={C.ink}/>
          <circle cx="57" cy="68" r="1.5" fill={C.cream}/>
          <circle cx="87" cy="68" r="1.5" fill={C.cream}/>
          {expression === 'happy' && <path d="M52 88 Q 70 102 88 88" stroke={C.ink} strokeWidth="4" fill="none" strokeLinecap="round"/>}
          {expression === 'oh'    && <ellipse cx="70" cy="92" rx="7" ry="9" fill={C.ink}/>}
          <circle cx="40" cy="88" r="4" fill={C.yellow} opacity="0.9"/>
          <circle cx="100" cy="88" r="4" fill={C.yellow} opacity="0.9"/>
          <path d="M55 22 Q 50 14 58 8" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>
          <path d="M70 18 Q 65 10 73 4" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>
          <path d="M85 22 Q 80 14 88 8" stroke={C.ink} strokeWidth="3" fill="none" strokeLinecap="round"/>
        </svg>
      );
    }

    function Sticker({ children, bg = C.red, color = C.cream, rot = -3, size = 13, style = {} }) {
      return (
        <span style={{
          display: 'inline-block', background: bg, color,
          padding: '6px 12px',
          border: `2.5px solid ${C.ink}`,
          borderRadius: 8, fontWeight: 800, fontSize: size,
          transform: `rotate(${rot}deg)`,
          boxShadow: `3px 3px 0 ${C.ink}`,
          fontFamily: "'IBM Plex Mono', monospace",
          letterSpacing: 0.5,
          lineHeight: 1,
          whiteSpace: 'nowrap',
          ...style,
        }}>{children}</span>
      );
    }

    const SCENARIOS = [
      { ca: 'Entrant al restaurant', en: 'walking in',  step: '0/10', color: C.red,  rot: -1.5 },
      { ca: 'Reservar per telèfon',  en: 'booking',     step: '0/8',  color: C.blue, rot:  1   },
      { ca: 'Demanant la carta',     en: 'menu',        step: '0/12', color: C.green,rot: -1   },
      { ca: 'Demanant el compte',    en: 'check',       step: '0/6',  color: C.ink,  rot:  1.5 },
    ];

    // ── Walking-in content (SAR-19) — DRAFT Catalan, pending native review before public ship.
    // Hardcoded for Phase 1. Shape kept JSON-ready so it lifts to /scenarios/walking-in.json
    // for the data-driven pool (SAR-23) later without a rewrite.
    // Each step: a cambrera (waiter) line you must answer. 3 tone-tagged responses, one correct.
    // `note` is why (the inline correction). `reply` is what they say back when you nail it —
    // so you learn to recognise it, not just recite your own line. `hack` is the cultural tip.
    const WALKING_IN = {
      id: 'walking-in',
      ca: 'Entrant al restaurant',
      en: 'walking in',
      steps: [
        {
          // You have a reservation
          waiter: { ca: 'Bona nit, teniu reserva?', en: 'good evening, do you have a reservation?' },
          reply:  { ca: 'Perfecte, acompanyeu-me.', en: 'perfect, follow me.' },
          hack: 'Curt = català. Nom i quants sou, prou. No t’excusis ni allarguis.',
          options: [
            { t: 'Sí, a nom de Martí, per dos.', tone: 'NATURAL', correct: true,
              note: 'Nom + quants sou. Just el que necessiten, ni una paraula més.' },
            { t: 'Tinc una taula reservada.', tone: 'LITERAL', correct: false,
              note: '“Taula” és el moble; el que has fet és una “reserva”. Digues “Tinc reserva”.' },
            { t: 'Voldria confirmar la meva reserva, si us plau.', tone: 'MASSA FORMAL', correct: false,
              note: 'Ningú parla així entrant a un bar. Curt = nadiu.' },
          ],
        },
        {
          // No reservation — asking if there's space
          waiter: { ca: 'Teniu reserva?', en: 'do you have a reservation?' },
          reply:  { ca: 'Per dos? Sí, passeu.', en: 'for two? sure, come in.' },
          hack: '“Teniu lloc?” és LA frase. Curta i directa, sense embuts.',
          options: [
            { t: 'No, però teniu lloc per dos?', tone: 'NATURAL', correct: true,
              note: '“Teniu lloc?” és exactament el que diu un d’aquí. Directe i amable.' },
            { t: 'No tenim reserva. Hi hauria alguna taula disponible, si us plau?', tone: 'MASSA FORMAL', correct: false,
              note: 'S’entén, però és llarg. “Teniu lloc?” fa la mateixa feina en tres paraules.' },
            { t: 'Volem menjar aquí ara.', tone: 'MASSA SEC', correct: false,
              note: 'Sona a ordre. Pregunta, no anunciïs: “Teniu lloc?”.' },
          ],
        },
        {
          // Running late
          waiter: { ca: 'Feu una mica tard, eh?', en: 'running a bit late, eh?' },
          reply:  { ca: 'Tranquils, encara la teniu. Passeu.', en: 'no worries, it’s still yours. come in.' },
          hack: 'Un “perdó” i avant. Excusar-te massa et delata com a turista.',
          options: [
            { t: 'Sí, perdó! Encara teniu la taula?', tone: 'NATURAL', correct: true,
              note: 'Reconeixes i preguntes. Càlid i ràpid, sense drama.' },
            { t: 'El trànsit estava fatal, ho sento moltíssim, de veritat.', tone: 'T’EXCUSES MASSA', correct: false,
              note: 'Amb un “perdó” n’hi ha prou. Excusar-se de més és molt de fora.' },
            { t: 'Tinc reserva, la taula és meva.', tone: 'A LA DEFENSIVA', correct: false,
              note: 'No et posis a la defensiva: ningú t’està acusant de res.' },
          ],
        },
      ],
    };

    function getDayLabel() {
      const days = ['DIUMENGE','DILLUNS','DIMARTS','DIMECRES','DIJOUS','DIVENDRES','DISSABTE'];
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0');
      const mm = String(now.getMinutes()).padStart(2,'0');
      return `${days[now.getDay()]} · ${hh}:${mm}`;
    }

    function HomeScreen({ onOpen }) {
      return (
        <div style={{
          maxWidth: 430,
          margin: '0 auto',
          minHeight: '100vh',
          background: C.yellow,
          padding: '54px 22px 40px',
          color: C.ink,
          position: 'relative',
        }}>
          {/* header */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 14 }}>
            <div>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.2, textTransform: 'uppercase', fontWeight: 700 }}>
                {getDayLabel()}
              </div>
              <div style={{ fontWeight: 800, fontSize: 32, lineHeight: 0.95, marginTop: 4, letterSpacing: -1, transform: 'rotate(-1deg)', transformOrigin: 'left' }}>
                HOLA<br/>NOIA!
              </div>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6, alignItems: 'flex-end' }}>
              <Sticker bg={C.red} rot={4} size={11}>♥ ♥ ♥</Sticker>
              <Sticker bg={C.cream} color={C.ink} rot={-3} size={11}>5 DIES</Sticker>
            </div>
          </div>

          {/* full-flow card */}
          <div style={{
            background: C.red, color: C.cream,
            border: `2.5px solid ${C.ink}`,
            borderRadius: 16, padding: 16, marginBottom: 16,
            boxShadow: `5px 5px 0 ${C.ink}`,
            position: 'relative', overflow: 'hidden',
          }}>
            <div style={{ position: 'absolute', right: -14, bottom: -16, opacity: 0.98 }}>
              <CassolaMascot size={120}/>
            </div>
            <Sticker bg={C.yellow} color={C.ink} rot={-3} size={10} style={{ boxShadow: `2px 2px 0 ${C.ink}` }}>
              MODE COMPLET
            </Sticker>
            <div style={{ fontWeight: 800, fontSize: 26, lineHeight: 0.95, marginTop: 10, maxWidth: 190, letterSpacing: -0.8 }}>
              UN SOPAR DE CAP A PEUS
            </div>
            <div style={{ fontSize: 12, opacity: 0.95, marginTop: 8, maxWidth: 180, lineHeight: 1.4 }}>
              Reserva, entrar, demanar, pagar. Amb curveballs.
            </div>
            <button style={{
              marginTop: 12,
              background: C.yellow, color: C.ink,
              border: `2.5px solid ${C.ink}`,
              borderRadius: 8, padding: '8px 14px',
              fontSize: 13, fontWeight: 800,
              boxShadow: `3px 3px 0 ${C.ink}`,
            }}>
              SOM-HI! →
            </button>
          </div>

          {/* scenario list */}
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase', marginBottom: 10, fontWeight: 700 }}>
            O TRIA UNA ESCENA
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {SCENARIOS.map((s, i) => (
              <div key={i} onClick={() => onOpen(s)} style={{
                background: C.cream,
                border: `2.5px solid ${C.ink}`,
                borderRadius: 12, padding: '10px 12px',
                display: 'flex', alignItems: 'center', gap: 12,
                boxShadow: `3px 3px 0 ${C.ink}`,
                transform: `rotate(${s.rot * 0.4}deg)`,
                cursor: 'pointer',
              }}>
                <div style={{ width: 36, height: 36, borderRadius: 8, background: s.color, border: `2.5px solid ${C.ink}`, flexShrink: 0 }}/>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 800 }}>{s.ca}</div>
                  <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, color: C.muted, textTransform: 'uppercase', letterSpacing: 0.8 }}>
                    {s.en} · {s.step}
                  </div>
                </div>
                <div style={{ fontWeight: 800, fontSize: 18 }}>→</div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function ScenarioScreen({ scenario, onBack, onStart }) {
      const s = scenario || SCENARIOS[0];
      return (
        <div style={{
          maxWidth: 430,
          margin: '0 auto',
          minHeight: '100vh',
          background: C.yellow,
          padding: '54px 22px 0',
          color: C.ink,
          boxSizing: 'border-box',
          display: 'flex', flexDirection: 'column',
        }}>
          {/* header: back · escena tag · progress */}
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
            <button onClick={onBack} style={{ background: 'none', border: 'none', fontSize: 22, fontWeight: 800, color: C.ink, padding: 0 }}>←</button>
            <Sticker bg={C.ink} color={C.yellow} rot={-2} size={10}>ESCENA 01</Sticker>
            <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, color: C.ink, fontWeight: 700 }}>{s.step}</span>
          </div>

          {/* cover card */}
          <div style={{ background: C.red, color: C.cream, border: `2.5px solid ${C.ink}`, borderRadius: 18, padding: 18, marginBottom: 16, boxShadow: `5px 5px 0 ${C.ink}`, position: 'relative', overflow: 'hidden' }}>
            <div style={{ position: 'absolute', right: -10, top: -6, transform: 'rotate(12deg)' }}>
              <svg width="100" height="100" viewBox="0 0 100 100">
                <polygon points="50,4 60,38 96,38 66,58 78,94 50,72 22,94 34,58 4,38 40,38" fill={C.yellow} stroke={C.ink} strokeWidth="3"/>
              </svg>
            </div>
            <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, textTransform: 'uppercase', opacity: 0.95, fontWeight: 700 }}>{s.en}</div>
            <div style={{ fontWeight: 800, fontSize: 36, lineHeight: 0.92, marginTop: 6, maxWidth: 220, letterSpacing: -1.4, textTransform: 'uppercase' }}>{s.ca}</div>
            <div style={{ fontFamily: "'Newsreader', serif", fontStyle: 'italic', fontSize: 14, marginTop: 12, maxWidth: 230, lineHeight: 1.4 }}>
              Has reservat. Truques. Algú obre. Què surt de la teva boca primer?
            </div>
          </div>

          {/* variants */}
          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, color: C.ink, textTransform: 'uppercase', marginBottom: 10, fontWeight: 700 }}>VARIANTS</div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
            {[
              { t: 'Tinc reserva a nom de…', s: 'FÀCIL', c: C.green },
              { t: 'Som 4 + un extra', s: 'CURVEBALL', c: C.yellowDeep },
              { t: 'Faig 15 minuts tard', s: 'CURVEBALL', c: C.yellowDeep },
              { t: 'No us trobem la reserva', s: 'DIFÍCIL', c: C.red },
            ].map((v, i) => (
              <div key={i} style={{ background: C.cream, border: `2.5px solid ${C.ink}`, borderRadius: 10, padding: '8px 12px', display: 'flex', alignItems: 'center', gap: 10, boxShadow: `2px 2px 0 ${C.ink}` }}>
                <span style={{ width: 12, height: 12, background: v.c, border: `2px solid ${C.ink}`, borderRadius: 3, flexShrink: 0 }}/>
                <span style={{ fontSize: 14, fontWeight: 600, flex: 1 }}>{v.t}</span>
                <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, letterSpacing: 1, fontWeight: 700, color: v.c === C.red ? C.red : C.ink }}>{v.s}</span>
              </div>
            ))}
          </div>

          {/* en Caçó fills the wait — the held breath before you go */}
          <div style={{ flex: 1, minHeight: 120, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
            <CassolaMascot size={116}/>
            <div style={{ fontFamily: "'Newsreader', serif", fontStyle: 'italic', fontSize: 15, color: C.ink, opacity: 0.85 }}>
              Jo escolto.
            </div>
          </div>

          {/* CTA */}
          <div style={{ paddingBottom: 28 }}>
            <button onClick={onStart} style={{ width: '100%', background: C.ink, color: C.yellow, border: `2.5px solid ${C.ink}`, borderRadius: 12, padding: '16px', fontSize: 16, fontWeight: 800, boxShadow: `5px 5px 0 ${C.red}`, letterSpacing: 0.5 }}>
              COMENÇA, VINGA →
            </button>
          </div>
        </div>
      );
    }

    // Little smiling waiter avatar (kept from the design canvas)
    function WaiterAvatar() {
      return (
        <div style={{ flexShrink: 0, width: 52, height: 52, background: C.blue, border: `2.5px solid ${C.ink}`, borderRadius: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: `3px 3px 0 ${C.ink}` }}>
          <svg width="32" height="32" viewBox="0 0 40 40"><circle cx="20" cy="20" r="18" fill={C.cream} stroke={C.ink} strokeWidth="2.5"/><circle cx="15" cy="18" r="2.5" fill={C.ink}/><circle cx="25" cy="18" r="2.5" fill={C.ink}/><path d="M14 26 Q 20 30 26 26" stroke={C.ink} strokeWidth="2.5" fill="none" strokeLinecap="round"/></svg>
        </div>
      );
    }

    function PracticeScreen({ data, onExit }) {
      const steps = data.steps;
      const [stepIdx, setStepIdx] = React.useState(0);
      const [picked, setPicked]   = React.useState(null);  // index of chosen option
      const [checked, setChecked] = React.useState(false); // COMPROVA pressed
      const [lives, setLives]     = React.useState(3);
      const [done, setDone]       = React.useState(false);

      const step = steps[stepIdx];
      const pickedOpt = picked != null ? step.options[picked] : null;
      const wasRight = pickedOpt && pickedOpt.correct;
      const progress = ((stepIdx + (checked ? 1 : 0)) / steps.length) * 100;

      function check() {
        if (picked == null || checked) return;
        setChecked(true);
        if (!step.options[picked].correct) setLives((l) => Math.max(0, l - 1));
      }
      function next() {
        if (stepIdx + 1 >= steps.length) { setDone(true); return; }
        setStepIdx((i) => i + 1);
        setPicked(null);
        setChecked(false);
      }

      // ── Completion (lightweight — full reward screen is Phase 3)
      if (done) {
        return (
          <div style={{ maxWidth: 430, margin: '0 auto', minHeight: '100vh', background: C.yellow, padding: '54px 22px 28px', color: C.ink, boxSizing: 'border-box', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 18, textAlign: 'center' }}>
            <CassolaMascot size={150} expression="happy"/>
            <Sticker bg={C.green} color={C.cream} rot={-3} size={12}>MOLT BÉ!</Sticker>
            <div style={{ fontWeight: 800, fontSize: 30, lineHeight: 0.95, letterSpacing: -1, maxWidth: 280 }}>JA SAPS ENTRAR COM UN D’AQUÍ.</div>
            <div style={{ fontFamily: "'Newsreader', serif", fontStyle: 'italic', fontSize: 16, opacity: 0.85, maxWidth: 260 }}>
              {lives === 3 ? 'I sense una sola relliscada. Crack.' : `Et queden ${lives} ${lives === 1 ? 'vida' : 'vides'}. Gens malament.`}
            </div>
            <button onClick={onExit} style={{ marginTop: 8, width: '100%', maxWidth: 320, background: C.ink, color: C.yellow, border: `2.5px solid ${C.ink}`, borderRadius: 12, padding: '16px', fontSize: 16, fontWeight: 800, boxShadow: `5px 5px 0 ${C.red}`, letterSpacing: 0.5 }}>
              TORNA A L’INICI
            </button>
          </div>
        );
      }

      return (
        <div style={{ maxWidth: 430, margin: '0 auto', minHeight: '100vh', background: C.yellow, padding: '54px 22px 0', color: C.ink, boxSizing: 'border-box', display: 'flex', flexDirection: 'column' }}>
          {/* header: close · progress bar · lives */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
            <button onClick={onExit} style={{ background: 'none', border: 'none', fontSize: 22, fontWeight: 800, color: C.ink, padding: 0 }}>✕</button>
            <div style={{ flex: 1, height: 12, background: C.cream, border: `2.5px solid ${C.ink}`, borderRadius: 999, overflow: 'hidden' }}>
              <div style={{ width: `${progress}%`, height: '100%', background: C.red, transition: 'width 0.25s ease' }}/>
            </div>
            <Sticker bg={C.red} rot={4} size={10} style={{ boxShadow: `2px 2px 0 ${C.ink}` }}>♥{lives}</Sticker>
          </div>

          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, color: C.ink, textTransform: 'uppercase', marginBottom: 10, fontWeight: 700 }}>
            · CAMBRERA · {stepIdx + 1}/{steps.length} ·
          </div>

          {/* waiter line */}
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 16 }}>
            <WaiterAvatar/>
            <div style={{ background: C.cream, border: `2.5px solid ${C.ink}`, padding: '12px 14px', borderRadius: '6px 18px 18px 18px', flex: 1, boxShadow: `3px 3px 0 ${C.ink}` }}>
              <div style={{ fontWeight: 700, fontSize: 19, lineHeight: 1.15 }}>{step.waiter.ca}</div>
              <div style={{ fontSize: 11, color: C.muted, marginTop: 4, fontFamily: "'IBM Plex Mono', monospace" }}>{step.waiter.en}</div>
              <Sticker bg={C.yellow} color={C.ink} rot={-2} size={10} style={{ marginTop: 8, boxShadow: `2px 2px 0 ${C.ink}` }}>♪ TOCA ESCOLTA</Sticker>
            </div>
          </div>

          <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 1.5, color: C.ink, textTransform: 'uppercase', marginBottom: 10, fontWeight: 700, textAlign: 'center' }}>· TU RESPONS ·</div>

          {/* options */}
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {step.options.map((o, i) => {
              const isPicked = picked === i;
              let bg = C.cream, color = C.ink, shadow = `3px 3px 0 ${C.ink}`, opacity = 1;
              if (!checked) {
                if (isPicked) { bg = C.ink; color = C.yellow; shadow = `4px 4px 0 ${C.red}`; }
              } else {
                if (o.correct)      { bg = C.green; color = C.cream; shadow = `4px 4px 0 ${C.ink}`; }
                else if (isPicked)  { bg = C.red;   color = C.cream; shadow = `4px 4px 0 ${C.ink}`; }
                else                { opacity = 0.5; }
              }
              const rot = [-0.5, 0.5, -0.3][i] || 0;
              return (
                <button key={i} onClick={() => !checked && setPicked(i)} disabled={checked}
                  style={{ textAlign: 'left', background: bg, color, border: `2.5px solid ${C.ink}`, borderRadius: 12, padding: '12px 14px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 10, boxShadow: shadow, transform: `rotate(${rot}deg)`, opacity, transition: 'opacity 0.2s ease' }}>
                  <div>
                    <div style={{ fontSize: 14, fontWeight: 700 }}>{o.t}</div>
                    <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, opacity: 0.7, marginTop: 2, letterSpacing: 1 }}>{o.tone}</div>
                  </div>
                  {checked && o.correct && <span style={{ fontSize: 18, fontWeight: 800 }}>✓</span>}
                  {checked && isPicked && !o.correct && <span style={{ fontSize: 18, fontWeight: 800 }}>✕</span>}
                </button>
              );
            })}
          </div>

          {/* feedback after checking: the correction note + (if right) the waiter's comeback */}
          {checked && (
            <div style={{ marginTop: 14, background: wasRight ? C.cream : C.red, color: wasRight ? C.ink : C.cream, border: `2.5px solid ${C.ink}`, borderRadius: 14, padding: 14, boxShadow: `4px 4px 0 ${C.ink}` }}>
              <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, letterSpacing: 1.5, textTransform: 'uppercase', fontWeight: 700, marginBottom: 6, opacity: 0.8 }}>
                {wasRight ? 'CLAVAT' : 'GAIREBÉ'}
              </div>
              <div style={{ fontSize: 14, fontWeight: 600, lineHeight: 1.4 }}>{pickedOpt.note}</div>
              {wasRight && (
                <div style={{ marginTop: 10, paddingTop: 10, borderTop: `2px solid ${C.ink}`, opacity: 0.9 }}>
                  <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 9, letterSpacing: 1, opacity: 0.7 }}>ELLA RESPON · </span>
                  <span style={{ fontWeight: 700, fontSize: 14 }}>{step.reply.ca}</span>
                </div>
              )}
              <div style={{ marginTop: 10, fontFamily: "'Newsreader', serif", fontStyle: 'italic', fontSize: 13, lineHeight: 1.4 }}>
                💡 {step.hack}
              </div>
            </div>
          )}

          {/* CTA */}
          <div style={{ marginTop: 'auto', paddingBottom: 28, paddingTop: 16 }}>
            {!checked ? (
              <button onClick={check} disabled={picked == null}
                style={{ width: '100%', background: picked == null ? C.cream : C.green, color: picked == null ? C.muted : C.cream, border: `2.5px solid ${C.ink}`, borderRadius: 12, padding: '16px', fontSize: 16, fontWeight: 800, boxShadow: picked == null ? `3px 3px 0 ${C.ink}` : `5px 5px 0 ${C.ink}`, letterSpacing: 0.5, opacity: picked == null ? 0.7 : 1 }}>
                COMPROVA!
              </button>
            ) : (
              <button onClick={next}
                style={{ width: '100%', background: C.ink, color: C.yellow, border: `2.5px solid ${C.ink}`, borderRadius: 12, padding: '16px', fontSize: 16, fontWeight: 800, boxShadow: `5px 5px 0 ${C.red}`, letterSpacing: 0.5 }}>
                {stepIdx + 1 >= steps.length ? 'ACABA →' : 'CONTINUA →'}
              </button>
            )}
          </div>
        </div>
      );
    }

    function App() {
      const [screen, setScreen] = React.useState('home');
      const [scenario, setScenario] = React.useState(null);

      if (screen === 'practice') {
        return <PracticeScreen data={WALKING_IN} onExit={() => setScreen('home')} />;
      }
      if (screen === 'scenario') {
        return <ScenarioScreen scenario={scenario} onBack={() => setScreen('home')} onStart={() => setScreen('practice')} />;
      }
      return <HomeScreen onOpen={(s) => { setScenario(s); setScreen('scenario'); }} />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
